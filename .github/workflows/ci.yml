name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: sudo apt-get update && sudo apt-get install -y tmux ripgrep
      - run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run check || true   # known preexisting tsc errors; TODO.md tracks them
      - run: bun test --timeout 12000
        env:
          JEMACS_SKIP_TUI: "1"
